<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List System | Premium Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="app-container">
        <!-- Top Panel: Event Info -->
        <header class="top-panel">
            <div class="logo">
                <span class="logo-icon">⭐</span>
                <div class="header-text">
                    <h1>Polaris Group <span class="accent">Client Appreciation Night</span></h1>
                    <p class="event-details">Date: 27th March | Venue: Mandala Club</p>
                </div>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">Total Guests</span>
                    <span id="total-guests" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Groups</span>
                    <span id="total-groups" class="stat-value">0</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Panel: Guest List -->
            <aside class="left-panel">
                <div class="panel-header">
                    <h2>Number of Guest Invited</h2>
                </div>
                <div class="guest-list-wrapper">
                    <ul id="guest-list" class="guest-list">
                        <!-- Guest items will be injected here -->
                    </ul>
                    <div id="empty-state" class="empty-state">
                        <p>No guests added yet.</p>
                    </div>
                </div>
            </aside>

            <!-- Right Panel: Controls & Details -->
            <section class="right-panel">
                <div class="card add-guest-card">
                    <h3>Add New Guest</h3>
                    <form id="guest-form" class="guest-form">
                        <div class="input-group">
                            <label for="guest-name">Primary Name</label>
                            <input type="text" id="guest-name" name="name" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="guest-count">Number of Guests</label>
                            <input type="number" id="guest-count" name="count" min="1" value="1" required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Add to List</span>
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Removed Data Management and Info Cards -->
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
