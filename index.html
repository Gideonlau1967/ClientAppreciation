<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List System | Premium Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="app-container">
        <!-- Top Panel: Stats -->
        <header class="top-panel">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>GuestList <span class="accent">Pro</span></h1>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">Total Guests</span>
                    <span id="total-guests" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Groups</span>
                    <span id="total-groups" class="stat-value">0</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Left Panel: Guest List -->
            <aside class="left-panel">
                <div class="panel-header">
                    <h2>Guest Directory</h2>
                    <div class="search-box">
                        <input type="text" id="search-guests" placeholder="Search guests...">
                    </div>
                </div>
                <div class="guest-list-wrapper">
                    <ul id="guest-list" class="guest-list">
                        <!-- Guest items will be injected here -->
                    </ul>
                    <div id="empty-state" class="empty-state">
                        <p>No guests added yet.</p>
                    </div>
                </div>
            </aside>

            <!-- Right Panel: Controls & Details -->
            <section class="right-panel">
                <div class="card add-guest-card">
                    <h3>Add New Guest</h3>
                    <form id="guest-form" class="guest-form">
                        <div class="input-group">
                            <label for="guest-name">Primary Name</label>
                            <input type="text" id="guest-name" name="name" placeholder="e.g. John Doe" required>
                        </div>
                        <div class="input-group">
                            <label for="guest-count">Number of Guests</label>
                            <input type="number" id="guest-count" name="count" min="1" value="1" required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Add to List</span>
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </form>
                </div>

                <div id="data-controls" class="card data-card">
                    <h3>Data Management</h3>
                    <div class="data-actions">
                        <button id="export-txt" class="btn-secondary-outline">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>Export</span>
                        </button>
                        <button id="import-txt-btn" class="btn-secondary-outline">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span>Import</span>
                        </button>
                        <input type="file" id="import-txt" accept=".txt" style="display: none;">
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-icon">💡</div>
                    <div class="info-content">
                        <h4>Pro Tip</h4>
                        <p>Keep your guest list organized by using full names. Total count is updated in real-time at
                            the top panel.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
